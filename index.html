<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, initial-scale=1.0" />
  <title>Avik's Newsroom Monitor</title>

  <style>
    :root {
      --bg: #050505;
      --fg: #f5f5f7;
      --muted: #a1a1aa;
      --muted-2: #7c7c85;
      --line: rgba(255,255,255,0.08);
      --line-soft: rgba(255,255,255,0.05);

      --header-height: 84px;
      --section-title-height: 56px;

      --global: #7dd3fc;
      --india: #fbbf24;
      --payments: #86efac;
      --crypto: #c4b5fd;
      --regulation: #fca5a5;
      --neutral: #e5e7eb;
      --signal: #f9a8d4;
      --spotlight: #f0abfc;

      --kw-payments: #86efac;
      --kw-regulation: #fca5a5;
      --kw-india: #fbbf24;
      --kw-digital: #c4b5fd;
      --kw-ai: #93c5fd;

      --shadow-1: 0 10px 30px rgba(0,0,0,0.22);
      --shadow-2: 0 20px 50px rgba(0,0,0,0.28);
      --radius-xl: 24px;
    }

    * {
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at top left, rgba(120,120,140,0.12), transparent 28%),
        radial-gradient(circle at top right, rgba(90,120,255,0.08), transparent 24%),
        linear-gradient(180deg, #080809 0%, #050505 100%);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", Helvetica, Arial, sans-serif;
    }

    body {
      position: relative;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(to bottom, rgba(255,255,255,0.03), transparent 18%),
        radial-gradient(circle at 20% 10%, rgba(255,255,255,0.04), transparent 18%);
      z-index: 0;
    }

    .mainHeader {
      position: absolute;
      top: 14px;
      left: 14px;
      right: 14px;
      height: var(--header-height);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 0 24px;
      background: rgba(18, 18, 20, 0.68);
      border: 1px solid var(--line);
      border-radius: 22px;
      backdrop-filter: blur(24px) saturate(155%);
      -webkit-backdrop-filter: blur(24px) saturate(155%);
      box-shadow: var(--shadow-1);
      z-index: 30;
    }

    .headerTitle {
      font-size: 30px;
      font-weight: 650;
      letter-spacing: -0.03em;
      white-space: nowrap;
      color: #fafafa;
    }

    .headerClock {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: center;
      gap: 4px;
      min-width: 0;
      flex: 1 1 auto;
    }

    .clockRow {
      font-size: 15px;
      color: #d4d4d8;
      line-height: 1.2;
      white-space: nowrap;
      text-align: right;
      font-weight: 500;
      letter-spacing: -0.01em;
    }

    .dateRow {
      font-size: 13px;
      color: var(--muted-2);
      white-space: nowrap;
      text-align: right;
      letter-spacing: 0.01em;
    }

    .container {
      position: absolute;
      top: calc(14px + var(--header-height) + 14px);
      left: 14px;
      right: 14px;
      bottom: 14px;
      display: grid;
      grid-template-columns: 1.08fr 1.08fr 0.9fr;
      gap: 14px;
      z-index: 10;
    }

    .column {
      position: relative;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(18,18,20,0.78) 0%, rgba(12,12,14,0.72) 100%);
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      backdrop-filter: blur(20px) saturate(145%);
      -webkit-backdrop-filter: blur(20px) saturate(145%);
      box-shadow: var(--shadow-2);
    }

    .spotlightColumn {
      background:
        radial-gradient(circle at top right, rgba(217, 70, 239, 0.08), transparent 25%),
        linear-gradient(180deg, rgba(18,18,20,0.82) 0%, rgba(12,12,14,0.78) 100%);
      border: 1px solid rgba(240, 171, 252, 0.12);
    }

    .title {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 15;
      height: var(--section-title-height);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 18px;
      font-weight: 650;
      color: #d4d4d8;
      padding: 10px 14px;
      border-bottom: 1px solid var(--line-soft);
      background: linear-gradient(180deg, rgba(255,255,255,0.045) 0%, rgba(255,255,255,0.018) 100%);
      letter-spacing: -0.01em;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .spotlightTitle {
      color: #f5d0fe;
    }

    .viewport {
      position: absolute;
      top: var(--section-title-height);
      left: 0;
      right: 0;
      bottom: 0;
      overflow: hidden;
      padding: 8px 16px 20px 16px;
      mask-image: linear-gradient(to bottom, transparent 0%, black 4%, black 96%, transparent 100%);
      -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 4%, black 96%, transparent 100%);
    }

    .track {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      will-change: transform;
      animation-name: scrollUp;
      animation-timing-function: linear;
      animation-iteration-count: infinite;
      animation-duration: var(--duration, 240s);
    }

    .block {
      width: 100%;
    }

    .highSignalWrap {
      margin: 4px 2px 18px 2px;
      padding: 14px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.07);
      background: linear-gradient(180deg, rgba(255,255,255,0.055) 0%, rgba(255,255,255,0.026) 100%);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .highSignalTitle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--signal);
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.06);
    }

    .highSignalItem {
      padding: 10px 2px 12px 2px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .highSignalItem:last-child {
      border-bottom: none;
      padding-bottom: 2px;
    }

    .highSignalHeadline {
      font-size: 18px;
      line-height: 1.28;
      font-weight: 620;
      color: #f5f5f7;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }

    .highSignalSynopsis {
      font-size: 13px;
      line-height: 1.45;
      color: #b6b7bf;
      letter-spacing: -0.01em;
    }

    .item {
      margin: 10px 2px;
      padding: 16px 14px 18px 14px;
      border: 1px solid rgba(255,255,255,0.055);
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.022) 100%);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.035);
      word-break: break-word;
    }

    .spotlightItem {
      margin: 10px 2px;
      padding: 16px 14px 18px 14px;
      border: 1px solid rgba(240,171,252,0.12);
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(255,255,255,0.045) 0%, rgba(255,255,255,0.025) 100%);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.035);
      word-break: break-word;
    }

    .metaRow {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.08em;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.07);
      text-transform: uppercase;
    }

    .tag.global { color: var(--global); }
    .tag.india { color: var(--india); }
    .tag.payments { color: var(--payments); }
    .tag.crypto { color: var(--crypto); }
    .tag.regulation { color: var(--regulation); }
    .tag.neutral { color: var(--neutral); }
    .tag.spotlight { color: var(--spotlight); }

    .source {
      font-size: 11px;
      color: #8b8b95;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .timestamp {
      font-size: 11px;
      color: #9ca3af;
      letter-spacing: 0.03em;
      font-weight: 500;
      text-transform: none;
    }

    .headline {
      font-size: 22px;
      line-height: 1.28;
      color: #f5f5f7;
      letter-spacing: -0.03em;
      font-weight: 590;
      margin-bottom: 8px;
    }

    .spotlightHeadline {
      font-size: 21px;
      line-height: 1.28;
      color: #faf5ff;
      letter-spacing: -0.03em;
      font-weight: 620;
      margin-bottom: 8px;
    }

    .synopsis {
      font-size: 13px;
      line-height: 1.45;
      color: #aeb0b8;
      letter-spacing: -0.01em;
      font-weight: 450;
    }

    .whyMatters {
      margin-top: 12px;
      padding: 12px 13px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.03);
    }

    .whyMattersLabel {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 800;
      color: #d1d5db;
      margin-bottom: 6px;
    }

    .whyMattersText {
      font-size: 12px;
      line-height: 1.5;
      color: #d1d5db;
      letter-spacing: -0.01em;
    }

    .kw-payments { color: var(--kw-payments); font-weight: 700; }
    .kw-regulation { color: var(--kw-regulation); font-weight: 700; }
    .kw-india { color: var(--kw-india); font-weight: 700; }
    .kw-digital { color: var(--kw-digital); font-weight: 700; }
    .kw-ai { color: var(--kw-ai); font-weight: 700; }

    .newsLink {
      color: inherit;
      text-decoration: none;
    }

    @keyframes scrollUp {
      from { transform: translateY(0); }
      to { transform: translateY(calc(-1 * var(--loopDistance, 1000px))); }
    }
  </style>
</head>
<body>
  <div class="mainHeader">
    <div class="headerTitle">Avik's Newsroom Monitor</div>
    <div class="headerClock">
      <div class="clockRow" id="clockRow">EST --:-- | IST --:-- | CST --:-- | PT --:--</div>
      <div class="dateRow" id="dateRow">Loading date...</div>
    </div>
  </div>

  <div class="container">
    <section class="column">
      <div class="title">🌍 GLOBAL + INDIA</div>
      <div class="viewport" id="leftViewport">
        <div class="track" id="leftTrack"></div>
      </div>
    </section>

    <section class="column">
      <div class="title">💳 FINTECH + DIGITAL MONEY</div>
      <div class="viewport" id="rightViewport">
        <div class="track" id="rightTrack"></div>
      </div>
    </section>

    <section class="column spotlightColumn">
      <div class="title spotlightTitle">🔴 STABLECOIN SPOTLIGHT</div>
      <div class="viewport" id="spotlightViewport">
        <div class="track" id="spotlightTrack"></div>
      </div>
    </section>
  </div>

  <script>
    const REFRESH_MS = 2 * 60 * 1000;
    const PIXELS_PER_SECOND_LEFT = 7;
    const PIXELS_PER_SECOND_RIGHT = 7;
    const PIXELS_PER_SECOND_SPOTLIGHT = 6;
    const MAX_PER_SOURCE_PER_COLUMN = 3;
    const HIGH_SIGNAL_COUNT = 3;
    const MAX_ITEMS_PER_COLUMN = 14;
    const MAX_SPOTLIGHT_ITEMS = 10;

    let lastGoodLeftItems = [];
    let lastGoodRightItems = [];
    let lastGoodSpotlightItems = [];

    const leftFeeds = [
      { url: "https://feeds.bbci.co.uk/news/business/rss.xml", source: "BBC", defaultCategory: "global" },
      { url: "https://rss.nytimes.com/services/xml/rss/nyt/Business.xml", source: "NYTimes", defaultCategory: "global" },
      { url: "https://www.thehindu.com/business/feeder/default.rss", source: "The Hindu", defaultCategory: "india" },
      { url: "https://www.moneycontrol.com/rss/business.xml", source: "Moneycontrol", defaultCategory: "india" },
      { url: "https://www.ndtvprofit.com/rss", source: "NDTV Profit", defaultCategory: "india" }
    ];

    const rightFeeds = [
      { url: "https://www.finextra.com/rss/headlines.aspx", source: "Finextra", defaultCategory: "payments" },
      { url: "https://www.finextra.com/rss/artificial-intelligence.aspx", source: "Finextra AI", defaultCategory: "payments" },
      { url: "https://www.pymnts.com/feed/", source: "PYMNTS", defaultCategory: "payments" },
      { url: "https://www.coindesk.com/arc/outboundfeeds/rss/", source: "CoinDesk", defaultCategory: "crypto" },
      { url: "https://cointelegraph.com/rss", source: "Cointelegraph", defaultCategory: "crypto" },
      { url: "https://cryptoslate.com/feed/", source: "CryptoSlate", defaultCategory: "crypto" },
      { url: "https://decrypt.co/feed", source: "Decrypt", defaultCategory: "crypto" },
      { url: "https://www.ledgerinsights.com/feed/", source: "Ledger Insights", defaultCategory: "crypto" },
      { url: "https://www.paymentsdive.com/feeds/news/", source: "Payments Dive", defaultCategory: "payments" },
      { url: "https://data.bis.org/feed.xml", source: "BIS", defaultCategory: "regulation" },
      { url: "https://www.imf.org/en/News/rss", source: "IMF", defaultCategory: "regulation" }
    ];

    const SOURCE_WEIGHTS = {
      "BBC": 7,
      "NYTimes": 7,
      "The Hindu": 10,
      "Moneycontrol": 10,
      "NDTV Profit": 9,
      "Finextra": 14,
      "Finextra AI": 12,
      "PYMNTS": 11,
      "CoinDesk": 12,
      "Cointelegraph": 9,
      "CryptoSlate": 10,
      "Decrypt": 9,
      "Ledger Insights": 13,
      "Payments Dive": 11,
      "BIS": 16,
      "IMF": 15
    };

    const keywordRules = [
      { cls: "kw-payments", words: ["visa", "mastercard", "payment", "payments", "merchant", "wallet", "checkout", "banking", "cross-border", "fednow", "iso 20022"] },
      { cls: "kw-regulation", words: ["rbi", "sec", "cftc", "regulation", "regulator", "policy", "law", "rules", "compliance", "probe", "lawsuit", "sanction", "central bank", "bis", "imf"] },
      { cls: "kw-india", words: ["india", "indian", "rbi", "rupee", "mumbai", "delhi", "upi"] },
      { cls: "kw-digital", words: ["stablecoin", "bitcoin", "crypto", "blockchain", "token", "digital money", "cbdc", "usdc", "usdt", "tokenization", "onchain", "on-chain"] },
      { cls: "kw-ai", words: ["ai", "artificial intelligence", "agentic", "automation", "model"] }
    ];

    async function fetchFeedItems(feed) {
      const apiUrl = "https://api.rss2json.com/v1/api.json?rss_url=" + encodeURIComponent(feed.url);
      const response = await fetch(apiUrl, { cache: "no-store" });

      if (!response.ok) throw new Error(`Feed fetch failed: ${feed.url}`);

      const data = await response.json();
      if (!data.items || !Array.isArray(data.items)) return [];

      return data.items
        .map(item => ({
          title: (item.title || "").trim(),
          description: extractCleanDescription(item),
          pubDate: item.pubDate || "",
          link: item.link || "",
          source: feed.source,
          defaultCategory: feed.defaultCategory
        }))
        .filter(item => item.title);
    }

    function extractCleanDescription(item) {
      const raw = item.description || item.content || item.content_encoded || "";
      return stripHtml(raw).replace(/\s+/g, " ").trim();
    }

    function stripHtml(text) {
      return (text || "")
        .replace(/<script[\s\S]*?<\/script>/gi, "")
        .replace(/<style[\s\S]*?<\/style>/gi, "")
        .replace(/<[^>]+>/g, " ")
        .replace(/&nbsp;/gi, " ")
        .replace(/&amp;/gi, "&")
        .replace(/&quot;/gi, '"')
        .replace(/&#39;/gi, "'")
        .replace(/&apos;/gi, "'")
        .replace(/&lt;/gi, "<")
        .replace(/&gt;/gi, ">")
        .replace(/\s+/g, " ")
        .trim();
    }

    function normalizeTitle(text) {
      return (text || "")
        .toLowerCase()
        .replace(/[^\w\s]/g, " ")
        .replace(/\b(the|a|an|in|on|at|for|to|of|and|with|from|by)\b/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function getTitleTokenSet(text) {
      const stop = new Set(["the","a","an","in","on","at","for","to","of","and","with","from","by","is","are","was","were","will","new","over","into"]);
      return new Set(
        normalizeTitle(text)
          .split(" ")
          .filter(Boolean)
          .filter(token => token.length > 2 && !stop.has(token))
      );
    }

    function getJaccardSimilarity(a, b) {
      const setA = getTitleTokenSet(a);
      const setB = getTitleTokenSet(b);
      if (setA.size === 0 || setB.size === 0) return 0;

      let intersection = 0;
      for (const token of setA) if (setB.has(token)) intersection++;

      const union = new Set([...setA, ...setB]).size;
      return union ? intersection / union : 0;
    }

    function areLikelyDuplicateTitles(a, b) {
      const n1 = normalizeTitle(a);
      const n2 = normalizeTitle(b);
      if (!n1 || !n2) return false;
      if (n1 === n2) return true;
      if ((n1.includes(n2) || n2.includes(n1)) && Math.min(n1.length, n2.length) >= 40) return true;
      return getJaccardSimilarity(a, b) >= 0.78;
    }

    function dedupeItems(items) {
      const result = [];
      for (const item of items) {
        const duplicate = result.some(existing => areLikelyDuplicateTitles(existing.title, item.title));
        if (!duplicate) result.push(item);
      }
      return result;
    }

    function removeCrossDuplicates(leftItems, rightItems) {
      const cleanLeft = [];
      const cleanRight = [];

      for (const item of leftItems) {
        const duplicate = cleanLeft.some(existing => areLikelyDuplicateTitles(existing.title, item.title));
        if (!duplicate) cleanLeft.push(item);
      }

      for (const item of rightItems) {
        const duplicateOnLeft = cleanLeft.some(existing => areLikelyDuplicateTitles(existing.title, item.title));
        const duplicateOnRight = cleanRight.some(existing => areLikelyDuplicateTitles(existing.title, item.title));
        if (!duplicateOnLeft && !duplicateOnRight) cleanRight.push(item);
      }

      return { cleanLeft, cleanRight };
    }

    async function collectFeedItems(feeds, perFeedLimit = 6, totalLimit = 30) {
      let allItems = [];
      for (const feed of feeds) {
        try {
          const items = await fetchFeedItems(feed);
          if (items.length > 0) allItems = allItems.concat(items.slice(0, perFeedLimit));
        } catch (error) {
          console.log("Feed failed:", feed.url, error);
        }
      }
      return dedupeItems(allItems).slice(0, totalLimit);
    }

    function getCategory(item, columnType) {
      const text = item.title.toLowerCase();

      if (
        text.includes("regulation") || text.includes("regulator") || text.includes("policy") ||
        text.includes("rbi") || text.includes("sec") || text.includes("cftc") ||
        text.includes("compliance") || text.includes("law") || text.includes("rules") ||
        text.includes("central bank") || text.includes("bis") || text.includes("imf")
      ) return "regulation";

      if (
        text.includes("stablecoin") || text.includes("usdc") || text.includes("usdt") ||
        text.includes("tokenization") || text.includes("onchain") || text.includes("on-chain") ||
        text.includes("bitcoin") || text.includes("crypto") || text.includes("blockchain") ||
        text.includes("token") || text.includes("cbdc")
      ) return "crypto";

      if (
        text.includes("payment") || text.includes("merchant") || text.includes("fintech") ||
        text.includes("visa") || text.includes("mastercard") || text.includes("checkout") ||
        text.includes("wallet") || text.includes("banking") || text.includes("cross-border") ||
        text.includes("artificial intelligence") || text.includes("ai") ||
        text.includes("fednow") || text.includes("iso 20022")
      ) return "payments";

      if (columnType === "left") return item.defaultCategory === "india" ? "india" : "global";
      return item.defaultCategory || "neutral";
    }

    function getTagLabel(category) {
      switch (category) {
        case "global": return "GLOBAL";
        case "india": return "INDIA";
        case "payments": return "PAYMENTS";
        case "crypto": return "DIGITAL MONEY";
        case "regulation": return "REGULATION";
        default: return "UPDATE";
      }
    }

    function getPriorityScore(item, columnType) {
      const text = (item.title + " " + (item.description || "")).toLowerCase();
      let score = SOURCE_WEIGHTS[item.source] || 0;

      if (columnType === "right" || columnType === "spotlight") {
        if (text.includes("payment")) score += 18;
        if (text.includes("visa")) score += 18;
        if (text.includes("mastercard")) score += 18;
        if (text.includes("merchant")) score += 10;
        if (text.includes("wallet")) score += 8;
        if (text.includes("cross-border")) score += 18;
        if (text.includes("banking")) score += 8;
        if (text.includes("fintech")) score += 14;
        if (text.includes("stablecoin")) score += 30;
        if (text.includes("usdc") || text.includes("usdt")) score += 18;
        if (text.includes("tokenization")) score += 14;
        if (text.includes("onchain") || text.includes("on-chain")) score += 12;
        if (text.includes("crypto")) score += 10;
        if (text.includes("blockchain")) score += 8;
        if (text.includes("ai") || text.includes("artificial intelligence")) score += 12;
        if (text.includes("fednow")) score += 12;
        if (text.includes("iso 20022")) score += 12;
        if (text.includes("cbdc")) score += 18;
      }

      if (columnType === "left") {
        if (text.includes("india") || text.includes("indian")) score += 18;
        if (text.includes("rbi")) score += 20;
        if (text.includes("rupee")) score += 8;
        if (text.includes("upi")) score += 14;
        if (text.includes("economy")) score += 8;
      }

      if (text.includes("regulation") || text.includes("policy") || text.includes("rules") || text.includes("law")) score += 18;
      if (text.includes("sec") || text.includes("cftc") || text.includes("compliance")) score += 14;
      if (text.includes("fraud")) score += 14;
      if (text.includes("agentic")) score += 12;
      if (text.includes("probe") || text.includes("lawsuit") || text.includes("sanction")) score += 12;
      if (text.includes("central bank") || text.includes("bis") || text.includes("imf")) score += 14;

      return score;
    }

    function balanceAndRankItems(items, columnType, maxPerSource = 3, maxItems = MAX_ITEMS_PER_COLUMN) {
      if (!items.length) return [];

      const enriched = items.map((item, index) => ({
        ...item,
        priority: getPriorityScore(item, columnType),
        originalIndex: index
      }));

      enriched.sort((a, b) => {
        const dateA = new Date(a.pubDate || 0).getTime();
        const dateB = new Date(b.pubDate || 0).getTime();
        if (b.priority !== a.priority) return b.priority - a.priority;
        if (dateB !== dateA) return dateB - dateA;
        return a.originalIndex - b.originalIndex;
      });

      const sourceCounts = new Map();
      const selected = [];

      for (const item of enriched) {
        const count = sourceCounts.get(item.source) || 0;
        if (count < maxPerSource) {
          selected.push(item);
          sourceCounts.set(item.source, count + 1);
        }
        if (selected.length >= maxItems) break;
      }

      return selected;
    }

    function cleanupSynopsisText(text) {
      return (text || "").replace(/\s+/g, " ").replace(/\.\.\.+/g, ".").trim();
    }

    function pickCompleteSynopsisSentence(text) {
      const cleaned = cleanupSynopsisText(text)
        .replace(/^by\s+[a-z0-9 .,'-]+\s+/i, "")
        .replace(/^published\s+/i, "")
        .replace(/^updated\s+/i, "")
        .trim();

      if (!cleaned) return "";
      const parts = cleaned.match(/[^.!?]+[.!?]+/g);
      if (parts && parts.length) {
        const firstTwo = parts.slice(0, 2).join(" ").replace(/\s+/g, " ").trim();
        if (firstTwo.length >= 50) return firstTwo;
      }

      if (cleaned.length >= 50) {
        const punctuationIndex = cleaned.search(/[.!?]/);
        if (punctuationIndex > 30) return cleaned.slice(0, punctuationIndex + 1).trim();
        return cleaned;
      }

      return "";
    }

    function buildFallbackSynopsis(item, category, columnType) {
      const text = item.title.toLowerCase();

      if (text.includes("visa") || text.includes("mastercard")) {
        return "Could affect card network strategy, merchant economics, or acceptance trends across the market.";
      }
      if (text.includes("stablecoin")) {
        return "Signals momentum in programmable money, new settlement models, or cross-border payment innovation.";
      }
      if (text.includes("cross-border")) {
        return "Important for payment speed, corridor economics, settlement efficiency, and global merchant operations.";
      }
      if (category === "regulation") {
        return "This regulatory development could influence compliance priorities, market behavior, and strategic planning.";
      }
      if (category === "crypto") {
        return "This digital money update may shape adoption, investor sentiment, policy debate, or infrastructure direction.";
      }
      if (category === "payments") {
        return "This payments and fintech update is relevant to merchants, platforms, banks, and digital commerce decision-making.";
      }
      if (category === "india") {
        return "This India-focused development may matter for financial services, consumer behavior, and business conditions.";
      }
      if (columnType === "left") {
        return "This business and macro update adds context to why the headline matters more broadly.";
      }

      return "This development is relevant across fintech, payments, regulation, or digital money trends.";
    }

    function generateSynopsis(item, category, columnType) {
      const desc = pickCompleteSynopsisSentence(item.description || "");
      if (desc) return desc;
      return buildFallbackSynopsis(item, category, columnType);
    }

    function generateWhyThisMatters(item, category) {
      const text = (item.title + " " + (item.description || "")).toLowerCase();

      if (text.includes("stablecoin") && text.includes("bank")) {
        return "This may indicate stronger institutional movement toward stablecoin-enabled settlement, with implications for treasury design, liquidity models, and bank-led digital money infrastructure.";
      }
      if (text.includes("stablecoin") && text.includes("cross-border")) {
        return "This matters because cross-border stablecoin workflows are steadily moving closer to real operating use cases where speed, transparency, and cost are strategic differentiators.";
      }
      if (text.includes("stablecoin") && (text.includes("regulation") || text.includes("policy") || text.includes("law") || text.includes("sec"))) {
        return "The strategic significance lies in whether regulation accelerates enterprise adoption through clarity or slows expansion by increasing compliance and operating friction.";
      }
      if (text.includes("stablecoin") || text.includes("usdc") || text.includes("usdt")) {
        return "This is relevant because stablecoins are becoming a practical bridge between traditional financial rails and programmable digital settlement.";
      }
      if (text.includes("tokenization")) {
        return "This points to the broader shift toward programmable assets that can reshape issuance, transfer, settlement, and reconciliation models.";
      }
      if (text.includes("cbdc")) {
        return "CBDC developments can influence policy direction, interoperability priorities, and the competitive position of private digital money models.";
      }
      if (text.includes("visa") || text.includes("mastercard")) {
        return "Moves by large network players can materially influence merchant adoption patterns, ecosystem standards, and the shape of future digital money integration.";
      }
      if (category === "regulation") {
        return "This has strategic weight because regulatory direction often determines adoption speed, compliance cost, and market viability.";
      }
      if (category === "payments") {
        return "This matters because payments infrastructure shifts can change customer experience, operating margins, settlement speed, and platform scalability.";
      }
      if (category === "india") {
        return "This is important because India often serves as a leading indicator for scaled digital payment adoption and public infrastructure-led innovation.";
      }

      return "The broader significance lies in how this development could influence market structure, operating models, and strategic priorities.";
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.innerText = text || "";
      return div.innerHTML;
    }

    function highlightKeywords(text) {
      let output = escapeHtml(text);
      keywordRules.forEach(rule => {
        rule.words.forEach(word => {
          const escaped = word.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
          const regex = new RegExp(`\\b(${escaped})\\b`, "gi");
          output = output.replace(regex, `<span class="${rule.cls}">$1</span>`);
        });
      });
      return output;
    }

    function formatDateTime(dateStr) {
      if (!dateStr) return "";
      const date = new Date(dateStr);
      if (Number.isNaN(date.getTime())) return "";
      return new Intl.DateTimeFormat("en-US", {
        month: "short",
        day: "numeric",
        year: "numeric",
        hour: "numeric",
        minute: "2-digit",
        hour12: true
      }).format(date);
    }

    function buildItemHTML(items, columnType) {
      return items.map(item => {
        const category = getCategory(item, columnType);
        const synopsis = generateSynopsis(item, category, columnType);
        const whyThisMatters = generateWhyThisMatters(item, category);
        const isSpotlight = columnType === "spotlight";

        return `
          <div class="${isSpotlight ? "spotlightItem" : "item"}">
            <div class="metaRow">
              <span class="tag ${isSpotlight ? "spotlight" : category}">
                ${isSpotlight ? "STABLECOIN" : getTagLabel(category)}
              </span>
              <span class="source">${escapeHtml(item.source)}</span>
              <span class="timestamp">${escapeHtml(formatDateTime(item.pubDate))}</span>
            </div>
            <a class="newsLink" href="${escapeHtml(item.link || "#")}" target="_blank" rel="noopener noreferrer">
              <div class="${isSpotlight ? "spotlightHeadline" : "headline"}">${highlightKeywords(item.title)}</div>
            </a>
            <div class="synopsis">${escapeHtml(synopsis)}</div>
            <div class="whyMatters">
              <div class="whyMattersLabel">Why this matters</div>
              <div class="whyMattersText">${escapeHtml(whyThisMatters)}</div>
            </div>
          </div>
        `;
      }).join("");
    }

    function buildHighSignalHTML(items) {
      if (!items.length) return "";
      return `
        <div class="highSignalWrap">
          <div class="highSignalTitle">🔥 High Signal</div>
          ${items.map(item => `
            <div class="highSignalItem">
              <div class="highSignalHeadline">${escapeHtml(item.title)}</div>
              <div class="highSignalSynopsis">${escapeHtml(item._synopsis || "")}</div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function getHighSignalItems(items, columnType) {
      return items
        .slice()
        .sort((a, b) => b.priority - a.priority)
        .slice(0, HIGH_SIGNAL_COUNT)
        .map(item => {
          const category = getCategory(item, columnType);
          return { ...item, _synopsis: generateSynopsis(item, category, columnType) };
        });
    }

    function repeatUntilTallEnough(items, viewportHeight, estimatedItemHeight = 330) {
      if (!items.length) return [];
      const minItemsNeeded = Math.ceil((viewportHeight * 1.9) / estimatedItemHeight);
      const repeated = [];
      while (repeated.length < minItemsNeeded) repeated.push(...items);
      return repeated;
    }

    function renderSeamlessColumn(config) {
      const viewport = document.getElementById(config.viewportId);
      const track = document.getElementById(config.trackId);

      if (!config.items || config.items.length === 0) {
        track.innerHTML = "";
        return;
      }

      track.style.animation = "none";
      track.innerHTML = "";

      const ranked = balanceAndRankItems(
        config.items,
        config.columnType,
        config.maxPerSource || MAX_PER_SOURCE_PER_COLUMN,
        config.maxItems || MAX_ITEMS_PER_COLUMN
      );

      const highSignal = config.showHighSignal ? getHighSignalItems(ranked, config.columnType) : [];
      const regularItems = config.showHighSignal
        ? ranked.filter(item => !highSignal.some(signal => areLikelyDuplicateTitles(signal.title, item.title)))
        : ranked;

      const repeatedItems = repeatUntilTallEnough(regularItems.length ? regularItems : ranked, viewport.clientHeight, config.estimatedItemHeight || 330);
      const html = (config.showHighSignal ? buildHighSignalHTML(highSignal) : "") + buildItemHTML(repeatedItems, config.columnType);

      const block1 = document.createElement("div");
      const block2 = document.createElement("div");
      block1.className = "block";
      block2.className = "block";
      block1.innerHTML = html;
      block2.innerHTML = html;

      track.appendChild(block1);
      track.appendChild(block2);

      requestAnimationFrame(() => {
        const blockHeight = block1.offsetHeight || 1200;
        const durationSeconds = Math.max(blockHeight / config.pixelsPerSecond, config.minDuration || 110);

        track.style.setProperty("--loopDistance", `${blockHeight}px`);
        track.style.setProperty("--duration", `${durationSeconds}s`);
        void track.offsetHeight;
        track.style.animation = "";
      });
    }

    function isStablecoinHeadline(item) {
      const text = (item.title + " " + (item.description || "")).toLowerCase();
      return (
        text.includes("stablecoin") ||
        text.includes("usdc") ||
        text.includes("usdt") ||
        text.includes("circle") ||
        text.includes("tether") ||
        text.includes("tokenization") ||
        text.includes("cbdc") ||
        (text.includes("blockchain") && text.includes("payments")) ||
        text.includes("digital dollar") ||
        text.includes("digital euro")
      );
    }

    function getSpotlightItems(items) {
      return items
        .filter(isStablecoinHeadline)
        .map((item, index) => ({
          ...item,
          priority: getPriorityScore(item, "spotlight"),
          originalIndex: index
        }))
        .sort((a, b) => {
          const dateA = new Date(a.pubDate || 0).getTime();
          const dateB = new Date(b.pubDate || 0).getTime();
          if (b.priority !== a.priority) return b.priority - a.priority;
          return dateB - dateA;
        })
        .slice(0, MAX_SPOTLIGHT_ITEMS);
    }

    function getTime(zone) {
      return new Intl.DateTimeFormat("en-US", {
        timeZone: zone,
        hour: "numeric",
        minute: "2-digit",
        hour12: true
      }).format(new Date());
    }

    function getDate(zone) {
      return new Intl.DateTimeFormat("en-US", {
        timeZone: zone,
        weekday: "long",
        month: "long",
        day: "numeric",
        year: "numeric"
      }).format(new Date());
    }

    function updateClocks() {
      document.getElementById("clockRow").textContent =
        `EST ${getTime("America/New_York")} | IST ${getTime("Asia/Kolkata")} | CST ${getTime("America/Chicago")} | PT ${getTime("America/Los_Angeles")}`;
      document.getElementById("dateRow").textContent = getDate("America/New_York");
    }

    async function refreshAllNews() {
      const [freshLeftItems, freshRightItems] = await Promise.all([
        collectFeedItems(leftFeeds, 6, 28),
        collectFeedItems(rightFeeds, 6, 40)
      ]);

      const { cleanLeft, cleanRight } = removeCrossDuplicates(freshLeftItems, freshRightItems);

      const leftItems = cleanLeft.length ? cleanLeft : lastGoodLeftItems;
      const rightItems = cleanRight.length ? cleanRight : lastGoodRightItems;
      if (cleanLeft.length) lastGoodLeftItems = cleanLeft;
      if (cleanRight.length) lastGoodRightItems = cleanRight;

      const spotlightFresh = getSpotlightItems(freshRightItems);
      const spotlightItems = spotlightFresh.length ? spotlightFresh : lastGoodSpotlightItems;
      if (spotlightFresh.length) lastGoodSpotlightItems = spotlightFresh;

      renderSeamlessColumn({
        viewportId: "leftViewport",
        trackId: "leftTrack",
        items: leftItems,
        columnType: "left",
        pixelsPerSecond: PIXELS_PER_SECOND_LEFT,
        showHighSignal: true,
        minDuration: 110,
        estimatedItemHeight: 320
      });

      renderSeamlessColumn({
        viewportId: "rightViewport",
        trackId: "rightTrack",
        items: rightItems,
        columnType: "right",
        pixelsPerSecond: PIXELS_PER_SECOND_RIGHT,
        showHighSignal: true,
        minDuration: 110,
        estimatedItemHeight: 340
      });

      renderSeamlessColumn({
        viewportId: "spotlightViewport",
        trackId: "spotlightTrack",
        items: spotlightItems,
        columnType: "spotlight",
        pixelsPerSecond: PIXELS_PER_SECOND_SPOTLIGHT,
        showHighSignal: false,
        maxPerSource: 4,
        maxItems: MAX_SPOTLIGHT_ITEMS,
        minDuration: 95,
        estimatedItemHeight: 360
      });
    }

    updateClocks();
    setInterval(updateClocks, 1000);

    refreshAllNews();
    setInterval(refreshAllNews, REFRESH_MS);

    window.addEventListener("resize", refreshAllNews);
  </script>
</body>
