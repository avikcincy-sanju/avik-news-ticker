<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Avik's News Ticker</title>

  <style>
    :root {
      --bg: #050505;
      --bg-soft: rgba(255, 255, 255, 0.04);
      --bg-card: rgba(255, 255, 255, 0.055);
      --bg-card-2: rgba(255, 255, 255, 0.035);
      --fg: #f5f5f7;
      --muted: #a1a1aa;
      --muted-2: #7c7c85;
      --line: rgba(255,255,255,0.08);
      --line-soft: rgba(255,255,255,0.05);

      --header-height: 86px;
      --breaking-height: 48px;
      --section-title-height: 58px;

      --global: #7dd3fc;
      --india: #fbbf24;
      --payments: #86efac;
      --crypto: #c4b5fd;
      --regulation: #fca5a5;
      --neutral: #e5e7eb;

      --kw-payments: #86efac;
      --kw-regulation: #fca5a5;
      --kw-india: #fbbf24;
      --kw-digital: #c4b5fd;
      --kw-ai: #93c5fd;

      --shadow-1: 0 10px 30px rgba(0,0,0,0.22);
      --shadow-2: 0 20px 50px rgba(0,0,0,0.28);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
    }

    * {
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at top left, rgba(120,120,140,0.12), transparent 28%),
        radial-gradient(circle at top right, rgba(90,120,255,0.08), transparent 24%),
        linear-gradient(180deg, #080809 0%, #050505 100%);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", Helvetica, Arial, sans-serif;
    }

    body {
      position: relative;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(to bottom, rgba(255,255,255,0.03), transparent 18%),
        radial-gradient(circle at 20% 10%, rgba(255,255,255,0.04), transparent 18%);
      z-index: 0;
    }

    .mainHeader {
      position: absolute;
      top: 14px;
      left: 14px;
      right: 14px;
      height: var(--header-height);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 0 24px;
      background: rgba(18, 18, 20, 0.68);
      border: 1px solid var(--line);
      border-radius: 22px;
      backdrop-filter: blur(24px) saturate(155%);
      -webkit-backdrop-filter: blur(24px) saturate(155%);
      box-shadow: var(--shadow-1);
      z-index: 30;
    }

    .headerTitle {
      font-size: 30px;
      font-weight: 650;
      letter-spacing: -0.03em;
      white-space: nowrap;
      flex: 0 0 auto;
      color: #fafafa;
    }

    .headerClock {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      justify-content: center;
      gap: 4px;
      min-width: 0;
      flex: 1 1 auto;
    }

    .clockRow {
      font-size: 15px;
      color: #d4d4d8;
      line-height: 1.2;
      white-space: nowrap;
      text-align: right;
      font-weight: 500;
      letter-spacing: -0.01em;
    }

    .dateRow {
      font-size: 13px;
      color: var(--muted-2);
      white-space: nowrap;
      text-align: right;
      letter-spacing: 0.01em;
    }

    .breakingBar {
      position: absolute;
      top: calc(14px + var(--header-height) + 10px);
      left: 14px;
      right: 14px;
      height: var(--breaking-height);
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 18px;
      background: rgba(20, 20, 22, 0.66);
      border: 1px solid var(--line);
      border-radius: 18px;
      backdrop-filter: blur(18px) saturate(145%);
      -webkit-backdrop-filter: blur(18px) saturate(145%);
      box-shadow: var(--shadow-1);
      z-index: 25;
      overflow: hidden;
    }

    .breakingLabel {
      color: #ff7b7b;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.14em;
      white-space: nowrap;
      flex: 0 0 auto;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(252, 165, 165, 0.10);
      border: 1px solid rgba(252, 165, 165, 0.18);
      z-index: 2;
    }

    .breakingTickerWrap {
      position: relative;
      flex: 1 1 auto;
      overflow: hidden;
      height: 100%;
      display: flex;
      align-items: center;
      mask-image: linear-gradient(to right, transparent 0%, black 4%, black 96%, transparent 100%);
      -webkit-mask-image: linear-gradient(to right, transparent 0%, black 4%, black 96%, transparent 100%);
    }

    .breakingTicker {
      display: inline-flex;
      align-items: center;
      white-space: nowrap;
      will-change: transform;
      animation: scrollBreaking 55s linear infinite;
    }

    .breakingText {
      color: #f3f4f6;
      font-size: 15px;
      padding-right: 64px;
      white-space: nowrap;
      opacity: 0.96;
      letter-spacing: -0.01em;
    }

    .container {
      position: absolute;
      top: calc(14px + var(--header-height) + 10px + var(--breaking-height) + 14px);
      left: 14px;
      right: 14px;
      bottom: 14px;
      display: flex;
      width: calc(100vw - 28px);
      height: calc(100vh - (14px + var(--header-height) + 10px + var(--breaking-height) + 14px + 14px));
      gap: 14px;
      z-index: 10;
    }

    .column {
      position: relative;
      flex: 1;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(18,18,20,0.78) 0%, rgba(12,12,14,0.72) 100%);
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      backdrop-filter: blur(20px) saturate(145%);
      -webkit-backdrop-filter: blur(20px) saturate(145%);
      box-shadow: var(--shadow-2);
    }

    .title {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 15;
      height: var(--section-title-height);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 18px;
      font-weight: 650;
      color: #d4d4d8;
      padding: 10px 14px;
      border-bottom: 1px solid var(--line-soft);
      background: linear-gradient(180deg, rgba(255,255,255,0.045) 0%, rgba(255,255,255,0.018) 100%);
      letter-spacing: -0.01em;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .viewport {
      position: absolute;
      top: var(--section-title-height);
      left: 0;
      right: 0;
      bottom: 0;
      overflow: hidden;
      padding: 8px 16px 38px 16px;
      mask-image: linear-gradient(to bottom, transparent 0%, black 4%, black 94%, transparent 100%);
      -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 4%, black 94%, transparent 100%);
    }

    .track {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      will-change: transform;
      animation-name: scrollUp;
      animation-timing-function: linear;
      animation-iteration-count: infinite;
      animation-duration: var(--duration, 150s);
    }

    .block {
      width: 100%;
    }

    .item {
      margin: 10px 2px;
      padding: 16px 14px 18px 14px;
      border: 1px solid rgba(255,255,255,0.055);
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.022) 100%);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.035);
      word-break: break-word;
    }

    .metaRow {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.08em;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.07);
      text-transform: uppercase;
    }

    .tag.global { color: var(--global); }
    .tag.india { color: var(--india); }
    .tag.payments { color: var(--payments); }
    .tag.crypto { color: var(--crypto); }
    .tag.regulation { color: var(--regulation); }
    .tag.neutral { color: var(--neutral); }

    .source {
      font-size: 11px;
      color: #8b8b95;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .headline {
      font-size: 24px;
      line-height: 1.28;
      color: #f5f5f7;
      letter-spacing: -0.03em;
      font-weight: 590;
    }

    .kw-payments { color: var(--kw-payments); font-weight: 700; }
    .kw-regulation { color: var(--kw-regulation); font-weight: 700; }
    .kw-india { color: var(--kw-india); font-weight: 700; }
    .kw-digital { color: var(--kw-digital); font-weight: 700; }
    .kw-ai { color: var(--kw-ai); font-weight: 700; }

    .status {
      position: absolute;
      bottom: 10px;
      left: 14px;
      right: 14px;
      z-index: 16;
      text-align: center;
      font-size: 12px;
      color: #8b8b95;
      background: rgba(16, 16, 18, 0.72);
      border: 1px solid rgba(255,255,255,0.05);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      padding: 8px 10px;
      border-radius: 999px;
      pointer-events: none;
    }

    @keyframes scrollUp {
      from {
        transform: translateY(0);
      }
      to {
        transform: translateY(calc(-1 * var(--loopDistance, 1000px)));
      }
    }

    @keyframes scrollBreaking {
      0% {
        transform: translateX(0);
      }
      100% {
        transform: translateX(-50%);
      }
    }

    @media (max-width: 1100px) {
      .container {
        gap: 10px;
      }

      .headerTitle {
        font-size: 24px;
      }

      .headline {
        font-size: 21px;
      }

      .title {
        font-size: 16px;
      }
    }

    @media (max-width: 900px) {
      .mainHeader,
      .breakingBar,
      .container {
        left: 10px;
        right: 10px;
      }

      .mainHeader {
        top: 10px;
        height: 78px;
        padding: 0 16px;
      }

      .breakingBar {
        top: calc(10px + 78px + 8px);
      }

      .container {
        top: calc(10px + 78px + 8px + var(--breaking-height) + 10px);
        bottom: 10px;
        width: calc(100vw - 20px);
        height: auto;
      }

      .headerTitle {
        font-size: 20px;
      }

      .clockRow {
        font-size: 12px;
      }

      .dateRow {
        font-size: 11px;
      }

      .breakingLabel,
      .breakingText {
        font-size: 12px;
      }

      .headline {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="mainHeader">
    <div class="headerTitle">Avik's News Ticker</div>

    <div class="headerClock">
      <div class="clockRow" id="clockRow">EST --:-- | IST --:-- | CST --:-- | PT --:--</div>
      <div class="dateRow" id="dateRow">Loading date...</div>
    </div>
  </div>

  <div class="breakingBar">
    <div class="breakingLabel">BREAKING</div>
    <div class="breakingTickerWrap">
      <div class="breakingTicker" id="breakingTicker"></div>
    </div>
  </div>

  <div class="container">
    <section class="column">
      <div class="title">🌍 GLOBAL + INDIA</div>
      <div class="viewport" id="leftViewport">
        <div class="track" id="leftTrack"></div>
      </div>
      <div class="status" id="leftStatus">Loading news...</div>
    </section>

    <section class="column">
      <div class="title">💳 FINTECH + DIGITAL MONEY</div>
      <div class="viewport" id="rightViewport">
        <div class="track" id="rightTrack"></div>
      </div>
      <div class="status" id="rightStatus">Loading news...</div>
    </section>
  </div>

  <script>
    const REFRESH_MS = 2 * 60 * 1000;

    // Slower scroll speeds
    const PIXELS_PER_SECOND_LEFT = 14;
    const PIXELS_PER_SECOND_RIGHT = 13;

    const MAX_PER_SOURCE_PER_COLUMN = 3;

    let lastGoodLeftItems = [];
    let lastGoodRightItems = [];
    let lastGoodBreakingItem = null;

    const leftFeeds = [
      { url: "https://feeds.bbci.co.uk/news/business/rss.xml", source: "BBC", defaultCategory: "global" },
      { url: "https://rss.nytimes.com/services/xml/rss/nyt/Business.xml", source: "NYTimes", defaultCategory: "global" },
      { url: "https://www.thehindu.com/business/feeder/default.rss", source: "The Hindu", defaultCategory: "india" },
      { url: "https://www.moneycontrol.com/rss/business.xml", source: "Moneycontrol", defaultCategory: "india" },
      { url: "https://www.ndtvprofit.com/rss", source: "NDTV Profit", defaultCategory: "india" }
    ];

    const rightFeeds = [
      { url: "https://www.finextra.com/rss/headlines.aspx", source: "Finextra", defaultCategory: "payments" },
      { url: "https://www.finextra.com/rss/artificial-intelligence.aspx", source: "Finextra AI", defaultCategory: "payments" },
      { url: "https://www.pymnts.com/feed/", source: "PYMNTS", defaultCategory: "payments" },
      { url: "https://www.coindesk.com/arc/outboundfeeds/rss/", source: "CoinDesk", defaultCategory: "crypto" },
      { url: "https://cointelegraph.com/rss", source: "Cointelegraph", defaultCategory: "crypto" }
    ];

    const keywordRules = [
      { cls: "kw-payments", words: ["visa", "mastercard", "payment", "payments", "merchant", "wallet", "checkout", "banking", "cross-border"] },
      { cls: "kw-regulation", words: ["rbi", "sec", "cftc", "regulation", "regulator", "policy", "law", "rules", "compliance", "probe", "lawsuit", "sanction"] },
      { cls: "kw-india", words: ["india", "indian", "rbi", "rupee", "mumbai", "delhi"] },
      { cls: "kw-digital", words: ["stablecoin", "bitcoin", "crypto", "blockchain", "token", "digital money"] },
      { cls: "kw-ai", words: ["ai", "artificial intelligence", "agentic", "automation", "model"] }
    ];

    async function fetchFeedItems(feed) {
      const apiUrl =
        "https://api.rss2json.com/v1/api.json?rss_url=" + encodeURIComponent(feed.url);

      const response = await fetch(apiUrl, { cache: "no-store" });
      if (!response.ok) {
        throw new Error("Feed fetch failed");
      }

      const data = await response.json();
      if (!data.items || !Array.isArray(data.items)) {
        return [];
      }

      return data.items
        .map(item => ({
          title: (item.title || "").trim(),
          source: feed.source,
          defaultCategory: feed.defaultCategory
        }))
        .filter(item => item.title);
    }

    function dedupeItems(items) {
      const seen = new Set();
      const result = [];

      for (const item of items) {
        const key = item.title.toLowerCase().replace(/\s+/g, " ").trim();
        if (!seen.has(key)) {
          seen.add(key);
          result.push(item);
        }
      }

      return result;
    }

    async function collectFeedItems(feeds, perFeedLimit = 6, totalLimit = 24) {
      let allItems = [];

      for (const feed of feeds) {
        try {
          const items = await fetchFeedItems(feed);
          if (items.length > 0) {
            allItems = allItems.concat(items.slice(0, perFeedLimit));
          }
        } catch (error) {
          console.log("Feed failed:", feed.url, error);
        }
      }

      return dedupeItems(allItems).slice(0, totalLimit);
    }

    function getCategory(item, columnType) {
      const text = item.title.toLowerCase();

      if (
        text.includes("regulation") ||
        text.includes("regulator") ||
        text.includes("policy") ||
        text.includes("rbi") ||
        text.includes("sec") ||
        text.includes("cftc") ||
        text.includes("compliance") ||
        text.includes("law") ||
        text.includes("rules")
      ) {
        return "regulation";
      }

      if (
        text.includes("stablecoin") ||
        text.includes("bitcoin") ||
        text.includes("crypto") ||
        text.includes("blockchain") ||
        text.includes("token")
      ) {
        return "crypto";
      }

      if (
        text.includes("payment") ||
        text.includes("merchant") ||
        text.includes("fintech") ||
        text.includes("visa") ||
        text.includes("mastercard") ||
        text.includes("checkout") ||
        text.includes("wallet") ||
        text.includes("banking") ||
        text.includes("cross-border") ||
        text.includes("artificial intelligence") ||
        text.includes("ai")
      ) {
        return "payments";
      }

      if (columnType === "left") {
        return item.defaultCategory === "india" ? "india" : "global";
      }

      return item.defaultCategory || "neutral";
    }

    function getTagLabel(category) {
      switch (category) {
        case "global": return "GLOBAL";
        case "india": return "INDIA";
        case "payments": return "PAYMENTS";
        case "crypto": return "DIGITAL MONEY";
        case "regulation": return "REGULATION";
        default: return "UPDATE";
      }
    }

    function getPriorityScore(item, columnType) {
      const text = item.title.toLowerCase();
      let score = 0;

      if (columnType === "right") {
        if (text.includes("payment") || text.includes("payments")) score += 14;
        if (text.includes("visa")) score += 16;
        if (text.includes("mastercard")) score += 16;
        if (text.includes("merchant")) score += 10;
        if (text.includes("wallet")) score += 8;
        if (text.includes("cross-border")) score += 15;
        if (text.includes("banking")) score += 8;
        if (text.includes("fintech")) score += 10;
        if (text.includes("stablecoin")) score += 18;
        if (text.includes("crypto")) score += 10;
        if (text.includes("blockchain")) score += 8;
        if (text.includes("ai") || text.includes("artificial intelligence")) score += 12;
      }

      if (columnType === "left") {
        if (text.includes("india") || text.includes("indian")) score += 14;
        if (text.includes("rbi")) score += 18;
        if (text.includes("rupee")) score += 8;
      }

      if (text.includes("regulation") || text.includes("policy") || text.includes("rules") || text.includes("law")) score += 18;
      if (text.includes("sec") || text.includes("cftc") || text.includes("compliance")) score += 14;
      if (text.includes("fraud")) score += 14;
      if (text.includes("ai") || text.includes("artificial intelligence") || text.includes("agentic")) score += 10;
      if (text.includes("probe") || text.includes("lawsuit") || text.includes("sanction")) score += 10;
      if (text.includes("breaking")) score += 25;

      return score;
    }

    function balanceAndRankItems(items, columnType, maxPerSource = 3) {
      if (!items.length) return [];

      const enriched = items.map((item, index) => ({
        ...item,
        priority: getPriorityScore(item, columnType),
        originalIndex: index
      }));

      enriched.sort((a, b) => {
        if (b.priority !== a.priority) return b.priority - a.priority;
        return a.originalIndex - b.originalIndex;
      });

      const sourceCounts = new Map();
      const selected = [];

      for (const item of enriched) {
        const count = sourceCounts.get(item.source) || 0;
        if (count < maxPerSource) {
          selected.push(item);
          sourceCounts.set(item.source, count + 1);
        }
      }

      if (selected.length < Math.min(items.length, 12)) {
        for (const item of enriched) {
          if (!selected.includes(item)) {
            selected.push(item);
          }
          if (selected.length >= Math.min(items.length, 12)) {
            break;
          }
        }
      }

      return selected;
    }

    function shortenHeadline(text, maxLength = 128) {
      if (text.length <= maxLength) return text;
      const shortened = text.slice(0, maxLength);
      const lastSpace = shortened.lastIndexOf(" ");
      return (lastSpace > 80 ? shortened.slice(0, lastSpace) : shortened).trim() + "...";
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.innerText = text;
      return div.innerHTML;
    }

    function highlightKeywords(text) {
      let output = escapeHtml(text);

      keywordRules.forEach(rule => {
        rule.words.forEach(word => {
          const escaped = word.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
          const regex = new RegExp(`\\b(${escaped})\\b`, "gi");
          output = output.replace(regex, `<span class="${rule.cls}">$1</span>`);
        });
      });

      return output;
    }

    function buildItemHTML(items, columnType) {
      return items.map(item => {
        const category = getCategory(item, columnType);
        const tagLabel = getTagLabel(category);
        const headline = shortenHeadline(item.title);

        return `
          <div class="item">
            <div class="metaRow">
              <span class="tag ${category}">${tagLabel}</span>
              <span class="source">${escapeHtml(item.source)}</span>
            </div>
            <div class="headline">${highlightKeywords(headline)}</div>
          </div>
        `;
      }).join("");
    }

    function repeatUntilTallEnough(items, viewportHeight, estimatedItemHeight = 120) {
      if (!items.length) {
        return [];
      }

      const minItemsNeeded = Math.ceil((viewportHeight * 1.8) / estimatedItemHeight);
      const repeated = [];

      while (repeated.length < minItemsNeeded) {
        repeated.push(...items);
      }

      return repeated;
    }

    function isBreakingItem(item) {
      const text = item.title.toLowerCase();
      return (
        text.includes("breaking") ||
        text.includes("fed") ||
        text.includes("rbi") ||
        text.includes("regulation") ||
        text.includes("policy") ||
        text.includes("ban") ||
        text.includes("probe") ||
        text.includes("lawsuit") ||
        text.includes("sanction") ||
        text.includes("stablecoin") ||
        text.includes("artificial intelligence") ||
        text.includes("ai")
      );
    }

    function chooseBreaking(leftItems, rightItems) {
      const combined = [...rightItems, ...leftItems];
      const breaking = combined.find(isBreakingItem);
      return breaking || combined[0] || null;
    }

    function renderBreakingBar(item) {
      const el = document.getElementById("breakingTicker");

      if (!item) {
        if (!lastGoodBreakingItem) {
          el.innerHTML = "";
          return;
        }
        item = lastGoodBreakingItem;
      } else {
        lastGoodBreakingItem = item;
      }

      const text = `${item.source} • ${shortenHeadline(item.title, 160)} • `;
      const safeText = highlightKeywords(text);

      el.innerHTML = `
        <div class="breakingText">${safeText}</div>
        <div class="breakingText">${safeText}</div>
        <div class="breakingText">${safeText}</div>
        <div class="breakingText">${safeText}</div>
      `;
    }

    function renderSeamlessColumn(config) {
      const viewport = document.getElementById(config.viewportId);
      const track = document.getElementById(config.trackId);
      const status = document.getElementById(config.statusId);

      if (!config.items || config.items.length === 0) {
        status.innerText = `Feed unavailable • Retry in 2 min`;
        return;
      }

      track.style.animation = "none";
      track.innerHTML = "";

      const ranked = balanceAndRankItems(config.items, config.columnType, MAX_PER_SOURCE_PER_COLUMN);
      const items = repeatUntilTallEnough(ranked, viewport.clientHeight);

      if (!items.length) {
        status.innerText = `Feed unavailable • Retry in 2 min`;
        return;
      }

      const block1 = document.createElement("div");
      const block2 = document.createElement("div");

      block1.className = "block";
      block2.className = "block";

      const html = buildItemHTML(items, config.columnType);
      block1.innerHTML = html;
      block2.innerHTML = html;

      track.appendChild(block1);
      track.appendChild(block2);

      requestAnimationFrame(() => {
        const blockHeight = block1.offsetHeight || 1000;
        const durationSeconds = Math.max(blockHeight / config.pixelsPerSecond, 75);

        track.style.setProperty("--loopDistance", `${blockHeight}px`);
        track.style.setProperty("--duration", `${durationSeconds}s`);

        void track.offsetHeight;
        track.style.animation = "";

        status.innerText = `Updated ${new Date().toLocaleTimeString([], {
          hour: "numeric",
          minute: "2-digit"
        })} • Refresh every 2 min`;
      });
    }

    function getTime(zone) {
      const now = new Date();
      return new Intl.DateTimeFormat("en-US", {
        timeZone: zone,
        hour: "numeric",
        minute: "2-digit",
        hour12: true
      }).format(now);
    }

    function getDate(zone) {
      const now = new Date();
      return new Intl.DateTimeFormat("en-US", {
        timeZone: zone,
        weekday: "long",
        month: "long",
        day: "numeric",
        year: "numeric"
      }).format(now);
    }

    function updateClocks() {
      const clockRow = document.getElementById("clockRow");
      const dateRow = document.getElementById("dateRow");

      const est = getTime("America/New_York");
      const ist = getTime("Asia/Kolkata");
      const cst = getTime("America/Chicago");
      const pt = getTime("America/Los_Angeles");

      clockRow.textContent = `EST ${est} | IST ${ist} | CST ${cst} | PT ${pt}`;
      dateRow.textContent = getDate("America/New_York");
    }

    async function refreshAllNews() {
      const [freshLeftItems, freshRightItems] = await Promise.all([
        collectFeedItems(leftFeeds, 6, 24),
        collectFeedItems(rightFeeds, 6, 24)
      ]);

      const leftItems = freshLeftItems.length ? freshLeftItems : lastGoodLeftItems;
      const rightItems = freshRightItems.length ? freshRightItems : lastGoodRightItems;

      if (freshLeftItems.length) {
        lastGoodLeftItems = freshLeftItems;
      }

      if (freshRightItems.length) {
        lastGoodRightItems = freshRightItems;
      }

      renderBreakingBar(chooseBreaking(leftItems, rightItems));

      renderSeamlessColumn({
        viewportId: "leftViewport",
        trackId: "leftTrack",
        statusId: "leftStatus",
        items: leftItems,
        columnType: "left",
        pixelsPerSecond: PIXELS_PER_SECOND_LEFT
      });

      renderSeamlessColumn({
        viewportId: "rightViewport",
        trackId: "rightTrack",
        statusId: "rightStatus",
        items: rightItems,
        columnType: "right",
        pixelsPerSecond: PIXELS_PER_SECOND_RIGHT
      });
    }

    updateClocks();
    setInterval(updateClocks, 1000);

    refreshAllNews();
    setInterval(refreshAllNews, REFRESH_MS);

    window.addEventListener("resize", () => {
      refreshAllNews();
    });
  </script>
</body>
</html>
